name: Validate HTML & links

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON validity
        run: |
          python3 -c "import json; json.load(open('data.json')); print('data.json OK')"
          python3 -c "
          import json, sys
          m = json.load(open('manifest.json'))
          assert 'name' in m and 'start_url' in m
          print('manifest.json OK')
          "

      - name: Check for broken internal links
        run: |
          python3 -c "
          import re, os, sys
          html = open('index.html').read()
          hrefs = set(re.findall(r'href=\"([^\"#][^\"]*?)\"', html))
          local = [h for h in hrefs if not h.startswith('http') and not h.startswith('data:') and not h.startswith('mailto:')]
          # Root-relative URLs (e.g. /manifest.json) are served from the repo root, so check them relative to the repo.
          missing = [h for h in local if not os.path.exists(h.lstrip('/'))]
          if missing:
              print('Broken local links:', missing)
              sys.exit(1)
          print(f'All {len(local)} local links valid')
          "

      - name: Check for stale date references
        run: |
          ! grep -r 'September 2025\|October 2025\|August 2025' index.html downloads/ --include='*.html' || {
            echo "ERROR: Stale date references found"
            exit 1
          }

      - name: Validate sitemap
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('sitemap.xml'); print('sitemap.xml OK')"

      - name: Check JS brace balance in index.html
        run: |
          python3 -c "
          import re
          html = open('index.html').read()
          s = ''.join(re.findall(r'<script[^>]*>(.*?)</script>', html, re.DOTALL))
          o, c = s.count('{'), s.count('}')
          print(f'inline JS braces: {o} open, {c} close')
          assert o == c, f'Brace mismatch: {o} != {c}'
          "

      - name: Check data parity (inline fallback == data.json == index engine)
        run: python3 tools/check_data_parity.py
